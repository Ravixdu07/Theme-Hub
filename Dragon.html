<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berk // The Hidden World</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-top: #0a0e17;
            --sky-bottom: #1a365d;
            --plasma-core: #ffffff;
            --plasma-inner: #b829ff;
            --plasma-outer: #00e5ff;
            --viking-wood: #2d1b11;
            --viking-iron: #718096;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 100%);
            color: #f8f9fa;
            font-family: 'Nunito', sans-serif;
            overflow-x: hidden;
            height: 100vh;
            perspective: 1000px; /* Needed for dragon banking */
        }

        /* --- Parallax Clouds --- */
        .clouds {
            position: fixed; top: 0; left: 0; width: 200vw; height: 100vh;
            pointer-events: none; z-index: 1;
            background: transparent url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><ellipse cx="200" cy="150" rx="150" ry="40" fill="rgba(255,255,255,0.04)" filter="blur(10px)"/><ellipse cx="600" cy="350" rx="250" ry="60" fill="rgba(255,255,255,0.02)" filter="blur(15px)"/></svg>') repeat-x;
            animation: fly-clouds 20s linear infinite;
        }
        .clouds.fast {
            background-size: 150%;
            opacity: 0.8;
            z-index: 3;
            animation: fly-clouds 10s linear infinite reverse;
        }

        @keyframes fly-clouds { from { transform: translateX(0); } to { transform: translateX(-50vw); } }

        /* --- The Flying Dragon (Toothless) --- */
        #night-fury {
            position: fixed;
            width: 120px; height: 120px;
            pointer-events: none;
            z-index: 50;
            transform-origin: center center;
            /* Dynamic altitude shadow */
            filter: drop-shadow(0 40px 20px rgba(0,0,0,0.5));
            will-change: transform;
        }

        /* --- Plasma Blast Effects --- */
        .plasma-core {
            position: absolute;
            width: 20px; height: 20px;
            background: radial-gradient(circle, var(--plasma-core) 20%, var(--plasma-inner) 60%, transparent 100%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 40px 20px var(--plasma-inner), 0 0 80px 40px var(--plasma-outer);
            pointer-events: none;
            z-index: 100;
            animation: detonate 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .plasma-ring {
            position: absolute;
            width: 10px; height: 10px;
            border: 4px solid var(--plasma-outer);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 99;
            box-shadow: 0 0 20px var(--plasma-outer), inset 0 0 20px var(--plasma-inner);
            animation: expand-ring 0.6s ease-out forwards;
        }

        @keyframes detonate { 
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 1; } 
            50% { transform: translate(-50%, -50%) scale(3); opacity: 1; } 
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 
        }
        @keyframes expand-ring { 
            0% { width: 10px; height: 10px; opacity: 1; border-width: 10px; } 
            100% { width: 300px; height: 300px; opacity: 0; border-width: 0px; } 
        }

        /* Screen Shake */
        body.shake { animation: screen-shake 0.25s ease-in-out; }
        @keyframes screen-shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(12px, -12px) rotate(1.5deg); }
            50% { transform: translate(-12px, 12px) rotate(-1.5deg); }
            75% { transform: translate(12px, 12px) rotate(0deg); }
        }

        /* --- UI Layout --- */
        main {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dragon-book-panel {
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(10px);
            border: 4px solid var(--viking-wood);
            border-radius: 12px;
            padding: 50px 60px;
            max-width: 700px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 0 2px var(--viking-iron);
        }

        h1 {
            font-family: 'MedievalSharp', cursive;
            font-size: clamp(3rem, 8vw, 5rem);
            color: #f1c40f;
            text-shadow: 3px 3px 0px #000, 0 0 20px rgba(241, 196, 15, 0.3);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            line-height: 1;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--plasma-outer);
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 30px;
            display: block;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #cbd5e1;
        }

        /* --- Viking Button --- */
        .btn-fly {
            background: var(--viking-wood);
            color: #f8f9fa;
            font-family: 'MedievalSharp', cursive;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 15px 40px;
            border: 2px solid var(--viking-iron);
            border-radius: 4px;
            margin-top: 30px;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.1s;
            position: relative;
        }

        .btn-fly:hover {
            background: var(--plasma-inner);
            border-color: var(--plasma-outer);
            box-shadow: 0 0 20px var(--plasma-inner);
            transform: translateY(-2px);
        }
        
        .btn-fly:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000;
        }

    </style>
</head>
<body>

    <div class="clouds"></div>
    <div class="clouds fast"></div>

    <!-- The Refined Night Fury SVG (Toothless) -->
    <svg id="night-fury" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="1.5" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
        </defs>

        <!-- Main Body & Wings -->
        <path d="M 50 12 
                 C 47 12, 45 16, 43 20 
                 L 37 15 L 40 24 L 34 23 L 39 30 
                 C 35 34, 25 38, 15 42 
                 C 5 44, -2 60, 2 60 
                 C 15 55, 25 68, 35 58 
                 C 38 70, 45 65, 46 58 
                 C 46 75, 48 88, 48 88 
                 L 40 93 L 45 97 L 48 92 
                 L 50 100 
                 L 52 92 L 55 97 L 60 93 
                 L 52 88 
                 C 52 88, 54 75, 54 58 
                 C 55 65, 62 70, 65 58 
                 C 75 68, 85 55, 98 60 
                 C 102 60, 95 44, 85 42 
                 C 75 38, 65 34, 61 30 
                 L 66 23 L 60 24 L 63 15 L 57 20 
                 C 55 16, 53 12, 50 12 Z" 
              fill="#0b101a" stroke="#1e293b" stroke-width="0.5"/>

        <!-- Prosthetic Red Tail Fin (Left side) -->
        <path d="M 50 100 L 48 92 L 45 97 L 40 93 L 48 88 Z" fill="#991b1b" />
        
        <!-- Glowing Eyes -->
        <ellipse cx="46.5" cy="21" rx="1.5" ry="3.5" fill="#00e5ff" transform="rotate(-20 46.5 21)" filter="url(#neon-glow)"/>
        <ellipse cx="53.5" cy="21" rx="1.5" ry="3.5" fill="#00e5ff" transform="rotate(20 53.5 21)" filter="url(#neon-glow)"/>
        
        <!-- Spine Plasma Charge -->
        <circle cx="50" cy="35" r="1.2" fill="#b829ff" filter="url(#neon-glow)"/>
        <circle cx="50" cy="45" r="1.5" fill="#b829ff" filter="url(#neon-glow)"/>
        <circle cx="50" cy="55" r="1.2" fill="#b829ff" filter="url(#neon-glow)"/>
    </svg>

    <main>
        <div class="dragon-book-panel">
            <h1>This is Berk</h1>
            <span class="subtitle">Strike Class</span>
            <p>
                We have stubbornness issues, and our architecture is best described as 'collateral damage'. But we have the best views in the archipelago.
            </p>
            <p style="font-weight: bold; color: #fff; margin-top: 30px;">
                Click anywhere to command a Plasma Blast.
            </p>
            <button class="btn-fly" id="fly-home-btn">Fly to Hub</button>
        </div>
    </main>

    <script>
        // 1. Dragon Flight Physics (Follow Cursor with Banking)
        const dragon = document.getElementById('night-fury');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let dragonX = window.innerWidth / 2;
        let dragonY = window.innerHeight / 2 + 200; 
        let currentAngle = 0;
        let currentBank = 0; // Added for the 3D tilt

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateDragon() {
            // Calculate distance and base angle to mouse
            const dx = mouseX - dragonX;
            const dy = mouseY - dragonY;
            const targetAngle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;

            // Smooth positional movement (Lerp)
            dragonX += dx * 0.06;
            dragonY += dy * 0.06;

            // Smooth rotation handling (prevents 360 snapping)
            let diff = targetAngle - currentAngle;
            while (diff < -180) diff += 360;
            while (diff > 180) diff -= 360;
            currentAngle += diff * 0.1;

            // Dynamic Banking: Tilt the dragon based on horizontal movement
            // The faster he moves left/right, the harder he banks
            const targetBank = (dx / window.innerWidth) * 80; // Max tilt
            currentBank += (targetBank - currentBank) * 0.1;

            // Apply position, rotation, and 3D bank
            dragon.style.transform = `translate(${dragonX - 60}px, ${dragonY - 60}px) rotate(${currentAngle}deg) rotateY(${currentBank}deg)`;

            requestAnimationFrame(animateDragon);
        }
        animateDragon();

        // 2. Plasma Blast Mechanic
        window.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') return; 

            // Spawn Core
            const core = document.createElement('div');
            core.classList.add('plasma-core');
            core.style.left = e.clientX + 'px';
            core.style.top = e.clientY + 'px';
            document.body.appendChild(core);

            // Spawn Shockwave Ring
            const ring = document.createElement('div');
            ring.classList.add('plasma-ring');
            ring.style.left = e.clientX + 'px';
            ring.style.top = e.clientY + 'px';
            document.body.appendChild(ring);

            // Screen Shake
            document.body.classList.remove('shake');
            void document.body.offsetWidth; 
            document.body.classList.add('shake');

            // Cleanup DOM
            setTimeout(() => {
                core.remove();
                ring.remove();
                document.body.classList.remove('shake');
            }, 600);
        });

        // 3. Fly to Hub (Exit Transition)
        document.getElementById('fly-home-btn').addEventListener('click', () => {
            // Trigger a massive center blast as the transition
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = '50%'; flash.style.left = '50%';
            flash.style.width = '10px'; flash.style.height = '10px';
            flash.style.background = '#b829ff';
            flash.style.boxShadow = '0 0 100px 50px #00e5ff';
            flash.style.borderRadius = '50%';
            flash.style.zIndex = '9999';
            flash.style.transform = 'translate(-50%, -50%)';
            flash.style.transition = 'all 0.6s cubic-bezier(0.8, 0, 0.2, 1)';
            document.body.appendChild(flash);

            setTimeout(() => {
                flash.style.transform = 'translate(-50%, -50%) scale(300)';
                flash.style.background = '#fff';
            }, 10);

            setTimeout(() => {
                window.location.href = 'index.html'; 
            }, 700);
        });
    </script>
</body>
</html>
